services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cardapio
      POSTGRES_USER: cardapio
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardapio"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cardapio:${DB_PASSWORD:?set DB_PASSWORD}@db:5432/cardapio
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      APP_ORIGIN: ${APP_ORIGIN:?set APP_ORIGIN}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
