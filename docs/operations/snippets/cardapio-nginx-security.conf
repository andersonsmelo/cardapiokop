limit_req_zone $binary_remote_addr zone=cardapio_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=cardapio_upload:10m rate=10r/m;

server {
    client_max_body_size 5m;

    location /api/auth/login {
        limit_req zone=cardapio_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
    }

    location /api/upload {
        limit_req zone=cardapio_upload burst=10 nodelay;
        proxy_pass http://127.0.0.1:3001;
    }

    # App-level CSP is emitted by Next.js; edge keeps the transport/browser headers present on all responses.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
